<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Ryan's CareConnect</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    html, body { height: 100%; overflow: hidden; touch-action: pan-x pan-y; overscroll-behavior: none; }
    .scroll-pane { overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: none; }
    @keyframes pulse-dot {
      0%,100% { r:3; opacity:1; }
      50%      { r:6; opacity:0.35; }
    }
    @keyframes draw-pulse {
      0%   { stroke-dashoffset:120; }
      60%  { stroke-dashoffset:0; }
      100% { stroke-dashoffset:0; }
    }
    @keyframes pulse-line-opacity {
      0%  { opacity:1; } 75% { opacity:1; }
      85% { opacity:0; } 86% { opacity:0; }
      100%{ opacity:1; }
    }
    .pulse-line {
      stroke-dasharray:120;
      stroke-dashoffset:120;
      animation: draw-pulse 4.2s ease-out infinite, pulse-line-opacity 4.2s ease-out infinite;
    }
    .pulse-dot { animation: pulse-dot 4.2s ease-in-out infinite; }
  </style>
</head>
<body style="background:#f1f5f9;padding-bottom:52px;overflow:hidden;height:100vh;">

  <header style="position:fixed;top:0;left:0;right:0;background:linear-gradient(135deg,#083d4f,#0e7490);padding:6px 12px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,0.30);border-bottom:1px solid rgba(255,255,255,0.12);z-index:40;height:44px;">
    <div style="display:flex;align-items:center;flex:1;">
      <div style="line-height:1.15;flex-shrink:0;">
        <div style="font-size:16px;font-weight:900;letter-spacing:0.03em;color:#fde68a;">RYAN'S</div>
        <div style="font-size:16px;font-weight:900;letter-spacing:0.03em;color:#ffffff;">CARECONNECT</div>
      </div>
      <div style="position:relative;width:72px;height:32px;flex-shrink:0;margin-left:4px;">
        <svg viewBox="0 0 80 36" style="width:100%;height:100%;overflow:visible;">
          <polyline class="pulse-line"
            points="0,18 8,18 13,8 18,28 23,12 28,18 38,18 44,6 50,30 56,18 64,18 68,11 72,25 76,18 80,18"
            fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <circle class="pulse-dot" cx="80" cy="18" r="3" fill="#ef4444"/>
        </svg>
      </div>
    </div>
    <div style="display:flex;align-items:center;flex-shrink:0;">
      <input type="date" id="date-navigator"
        style="font-weight:700;font-size:11px;color:#f5c842;background:transparent;outline:none;border:none;max-width:110px;font-family:'IBM Plex Mono',monospace;">
    </div>
  </header>

  <main id="view-container" style="position:fixed;top:44px;left:0;right:0;bottom:52px;overflow:hidden;"></main>

  <nav id="main-nav" style="position:fixed;bottom:0;left:0;right:0;background:#042f3d;display:flex;justify-content:space-around;align-items:center;height:52px;z-index:50;border-top:1px solid rgba(255,255,255,0.08);">
    <button id="btn-meds"   style="display:flex;flex-direction:column;align-items:center;font-size:9px;font-family:Syne,sans-serif;font-weight:700;color:#3a4a6a;gap:1px;padding:0 6px;">💊<span>MEDS</span></button>
    <button id="btn-tasks"  style="display:flex;flex-direction:column;align-items:center;font-size:9px;font-family:Syne,sans-serif;font-weight:700;color:#3a4a6a;gap:1px;padding:0 6px;">✅<span>TASKS</span></button>
    <button id="btn-fluids" style="display:flex;flex-direction:column;align-items:center;font-size:9px;font-family:Syne,sans-serif;font-weight:700;color:#3a4a6a;gap:1px;padding:0 6px;">💧<span>IN-OUT</span></button>
    <button id="btn-logs"   style="display:flex;flex-direction:column;align-items:center;font-size:9px;font-family:Syne,sans-serif;font-weight:700;color:#3a4a6a;gap:1px;padding:0 6px;">📋<span>LOGS</span></button>
    <button id="btn-labs"   style="display:flex;flex-direction:column;align-items:center;font-size:9px;font-family:Syne,sans-serif;font-weight:700;color:#3a4a6a;gap:1px;padding:0 6px;">🔬<span>LABS</span></button>
    <button id="btn-rx"     style="display:flex;flex-direction:column;align-items:center;font-size:9px;font-family:Syne,sans-serif;font-weight:700;color:#3a4a6a;gap:1px;padding:0 6px;"><span style="font-size:13px;font-weight:900;line-height:1;">R<span style="font-size:8px;vertical-align:super;">x</span></span><span>RX</span></button>
  </nav>

  <div id="modal-container"></div>
  <div id="trend-container"></div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
