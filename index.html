<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Travel">
<title>Family Travel App</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── RESET & BASE ─────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-size:17px;}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;
     background:#f2f0eb;overscroll-behavior:none;min-height:100dvh;}

/* ── SUPABASE CONFIG ──────────────────────────── */
/* REPLACE these two values with your project credentials */

/* ── FAMILY TOGGLE SCREEN ────────────────────── */
.family-screen{position:fixed;inset:0;background:linear-gradient(160deg,#1a6b8a 0%,#0d4f6b 40%,#0a3d54 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9000;padding:2rem;}
.family-screen.hidden{display:none;}
.fs-title{font-size:1.4rem;font-weight:700;color:white;text-align:center;margin-bottom:0.3rem;letter-spacing:-0.3px;}
.fs-sub{font-size:0.75rem;color:rgba(255,255,255,0.65);text-align:center;margin-bottom:2.5rem;}
.fs-wave{font-size:3.5rem;margin-bottom:1.5rem;}
.fs-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;width:100%;max-width:22rem;}
.fs-tile{display:flex;flex-direction:column;align-items:center;gap:0.6rem;
  padding:1.6rem 1rem;border-radius:1.2rem;border:2px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.1);cursor:pointer;transition:all 0.18s;backdrop-filter:blur(8px);}
.fs-tile:active{background:rgba(255,255,255,0.22);transform:scale(0.97);}
.fs-tile-ico{font-size:2.2rem;}
.fs-tile-name{font-size:1rem;font-weight:600;color:white;}
.fs-tile-members{font-size:0.62rem;color:rgba(255,255,255,0.65);text-align:center;line-height:1.4;}

/* ── LOADING ──────────────────────────────────── */
.loading-screen{position:fixed;inset:0;background:linear-gradient(160deg,#1a6b8a,#0a3d54);
  display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:8000;}
.loading-screen.hidden{display:none;}
.loading-ico{font-size:3.5rem;margin-bottom:1rem;}
.loading-txt{font-size:0.9rem;color:rgba(255,255,255,0.8);font-weight:500;}

/* ── MAIN APP ─────────────────────────────────── */
#app{display:none;}

/* ── HERO ─────────────────────────────────────── */
.hero{background:#87CEEB;padding:0.75rem 0.9rem 4.2rem;position:relative;overflow:hidden;}
.hero::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1.6rem;
  background:#f2f0eb;clip-path:ellipse(55% 100% at 50% 100%);}
.hero-sun{position:absolute;top:0.5rem;right:0.5rem;width:2.2rem;height:2.2rem;border-radius:50%;
  background:radial-gradient(circle,#FFE566 40%,#FFD700 70%,rgba(255,215,0,0) 100%);
  pointer-events:none;z-index:0;opacity:0.9;}
.hero-row{display:flex;align-items:center;gap:0.5rem;position:relative;z-index:1;}
.hero-emoji{font-size:2.8rem;line-height:1;flex-shrink:0;}
.hero-text{flex:1;}
.hero-family-badge{display:inline-flex;align-items:center;gap:0.3rem;
  background:rgba(0,43,92,0.18);border-radius:99px;padding:0.18rem 0.55rem;
  font-size:0.6rem;font-weight:600;color:#002B5C;cursor:pointer;margin-bottom:0.18rem;}
.hero-family-badge i{font-size:0.7rem;}
.hero-title{font-size:1rem;font-weight:700;color:#002B5C;line-height:1.2;}
.hero-sub{font-size:0.6rem;color:#003A7A;margin-top:0.1rem;font-weight:500;}
.prog-row{margin-top:0.6rem;display:flex;align-items:center;gap:0.5rem;position:relative;z-index:1;}
.pw{flex:1;background:rgba(0,43,92,0.15);border-radius:99px;height:0.42rem;}
.pb{background:#FFD700;border-radius:99px;height:0.42rem;transition:width 0.4s;}
.pl{font-size:0.58rem;color:#002B5C;margin-top:0.22rem;font-weight:600;}
.new-trip-btn{display:flex;align-items:center;gap:0.22rem;padding:0.3rem 0.6rem;
  border-radius:0.5rem;border:1.5px solid rgba(0,43,92,0.35);
  background:rgba(255,255,255,0.45);font-size:0.6rem;color:#002B5C;
  cursor:pointer;flex-shrink:0;white-space:nowrap;font-weight:600;}
.new-trip-btn:active{background:rgba(255,255,255,0.7);}
.sync-dot{width:0.5rem;height:0.5rem;border-radius:50%;background:rgba(0,43,92,0.28);
  display:inline-block;margin-left:0.3rem;transition:background 0.3s;flex-shrink:0;}
.sync-dot.saving{background:#FFD700;}.sync-dot.error{background:#E53935;}

/* beach SVG wrapper */
.hero-beach{position:absolute;bottom:0.6rem;left:0;right:0;width:100%;height:2.8rem;pointer-events:none;}

/* ── USER TOOLBAR ─────────────────────────────── */
.toolbar{background:white;padding:0.48rem 0.7rem;border-bottom:1px solid #e4e0d8;
  display:flex;align-items:center;gap:0.32rem;overflow-x:auto;}
.ulbl{font-size:0.6rem;color:#999;white-space:nowrap;flex-shrink:0;}
.ubtn{display:flex;align-items:center;gap:0.22rem;padding:0.32rem 0.55rem;border-radius:99px;
  border:1.5px solid transparent;font-size:0.65rem;cursor:pointer;background:transparent;
  transition:all 0.15s;flex-shrink:0;white-space:nowrap;min-height:2rem;}
.ubtn.active{font-weight:600;}
.udot{width:0.42rem;height:0.42rem;border-radius:50%;flex-shrink:0;}
.pencil-btn{background:none;border:none;cursor:pointer;font-size:1rem;color:#bbb;
  padding:0.22rem 0.3rem;border-radius:0.25rem;flex-shrink:0;}
.pencil-btn:active{background:#f0ede6;}

/* ── 5-TAB NAV ────────────────────────────────── */
.nav5{display:flex;border-bottom:2px solid #ddd8cc;background:#f2f0eb;}
.nav5-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:0.12rem;
  padding:0.55rem 0.2rem 0.6rem;border:none;cursor:pointer;background:transparent;
  transition:all 0.15s;border-top:3px solid transparent;border-right:1px solid #e0d8c8;
  min-width:0;}
.nav5-btn:last-child{border-right:none;}
.nav5-btn:active{background:rgba(0,0,0,0.04);}
.nav5-btn.active{background:white;}
.nav5-btn.active.t-ryan    {border-top-color:#7F77DD;}
.nav5-btn.active.t-family  {border-top-color:#1D9E75;}
.nav5-btn.active.t-flight  {border-top-color:#378ADD;}
.nav5-btn.active.t-hotel   {border-top-color:#D85A30;}
.nav5-btn.active.t-reserve {border-top-color:#9B59B6;}
.nav5-ico{font-size:1.15rem;line-height:1;}
.nav5-lbl{font-size:0.52rem;font-weight:600;line-height:1;white-space:nowrap;color:#777;}
.nav5-btn.active .nav5-lbl{color:#222;}
.nav5-cnt{font-size:0.45rem;padding:0.05rem 0.3rem;border-radius:99px;margin-top:0.1rem;
  background:#e0d8c8;color:#555;}
.nav5-btn.active.t-ryan    .nav5-cnt{background:#CECBF6;color:#3C3489;}
.nav5-btn.active.t-family  .nav5-cnt{background:#9FE1CB;color:#085041;}
.nav5-btn.active.t-flight  .nav5-cnt{background:#B5D4F4;color:#0C447C;}
.nav5-btn.active.t-hotel   .nav5-cnt{background:#F5C4B3;color:#712B13;}
.nav5-btn.active.t-reserve .nav5-cnt{background:#E8C8F8;color:#6B2F9E;}

/* ── RYAN TAB — sub-nav ───────────────────────── */
.ryan-subnav{display:flex;gap:0;border-bottom:1px solid #e0d8c8;background:#EBF4FF;}
.ryan-sub-btn{flex:1;padding:0.55rem 0.5rem;border:none;font-size:0.68rem;font-weight:600;
  cursor:pointer;background:transparent;border-bottom:3px solid transparent;color:#667;transition:all 0.15s;}
.ryan-sub-btn.active{color:#3C3489;border-bottom-color:#7F77DD;background:white;}
.ryan-sub-btn:active{background:rgba(127,119,221,0.08);}

/* ── PANEL HEADERS ────────────────────────────── */
.ph{display:flex;align-items:center;gap:0.5rem;padding:0.65rem 0.85rem;border-bottom:2px solid transparent;}
.ph-ryan    {background:#DAEEF9;border-color:#7F77DD;}
.ph-family  {background:#E1F5EE;border-color:#1D9E75;}
.ph-flight  {background:#E6F1FB;border-color:#378ADD;}
.ph-hotel   {background:#FAECE7;border-color:#D85A30;}
.ph-reserve {background:#F3E8FD;border-color:#9B59B6;}
.ph-title{font-size:0.85rem;font-weight:600;flex:1;color:#111;}
.ph-cnt{font-size:0.62rem;padding:0.12rem 0.5rem;border-radius:99px;}
.ph-add{display:flex;align-items:center;gap:0.2rem;padding:0.3rem 0.65rem;border-radius:0.5rem;
  border:none;font-size:0.65rem;font-weight:600;cursor:pointer;white-space:nowrap;}
.ph-add-ryan   {background:#7F77DD;color:white;}
.ph-add-family {background:#1D9E75;color:white;}
.ph-add-flight {background:#378ADD;color:white;}
.ph-add-hotel  {background:#D85A30;color:white;}
.ph-add-reserve{background:#9B59B6;color:white;}
.ph-add:active{opacity:0.82;}

/* ── ITEM LIST (checklist) ────────────────────── */
.ilist{list-style:none;background:white;}
.irow{display:flex;align-items:center;gap:0.4rem;padding:0.7rem 0.85rem;
  border-bottom:0.5px solid rgba(0,0,0,0.06);min-height:2.75rem;}
.irow:last-child{border-bottom:none;}
.irow.donerow{opacity:0.48;}
.irow.skiprow{background:repeating-linear-gradient(90deg,transparent,transparent 8px,rgba(0,0,0,0.02) 8px,rgba(0,0,0,0.02) 9px);}
.chk{width:1.35rem;height:1.35rem;border-radius:50%;border:1.5px solid #b0c8b0;
  background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:0.72rem;flex-shrink:0;color:transparent;transition:all 0.15s;min-width:1.35rem;}
.chk.on{background:#1D9E75;border-color:#1D9E75;color:white;}
.itext{flex:1;font-size:0.78rem;color:#111;min-width:0;line-height:1.35;}
.itext.struck{text-decoration:line-through;color:#bbb;}
.itext.skp{font-style:italic;color:#b0a070;}
.undolnk{font-size:0.58rem;color:#1D9E75;cursor:pointer;text-decoration:underline;
  margin-top:0.1rem;display:block;}
.stamp{font-size:0.52rem;padding:0.1rem 0.4rem;border-radius:99px;font-weight:600;flex-shrink:0;}
.skipbdg{font-size:0.5rem;padding:0.1rem 0.38rem;border-radius:0.25rem;
  background:rgba(0,0,0,0.07);color:#8a7040;font-style:italic;
  border:1px dashed #c0a868;flex-shrink:0;}
.dotbtn{background:none;border:none;cursor:pointer;font-size:0.95rem;color:#c0a878;
  padding:0.1rem 0.18rem;border-radius:0.25rem;flex-shrink:0;
  min-width:1.75rem;min-height:1.75rem;display:flex;align-items:center;justify-content:center;}
.dotbtn:active{background:#f5f0e8;}
.empty-state{padding:2.5rem 1.5rem;text-align:center;color:#aaa;font-size:0.78rem;}

/* ── CARD LIST (flights/hotels/reservations) ──── */
.card-list{display:flex;flex-direction:column;gap:0;}
.card{background:white;border-bottom:1px solid #ece8e0;padding:0.85rem;
  cursor:pointer;transition:background 0.12s;position:relative;}
.card:active{background:#faf8f4;}
.card.past{opacity:0.52;}
.card-route{font-size:0.85rem;font-weight:600;color:#111;margin-bottom:0.2rem;}
.card-sub{font-size:0.65rem;color:#666;line-height:1.45;}
.card-badge{display:inline-block;font-size:0.52rem;font-weight:600;padding:0.1rem 0.4rem;
  border-radius:99px;margin-right:0.3rem;}
.card-chevron{position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);
  font-size:0.85rem;color:#ccc;}
.past-badge{font-size:0.5rem;padding:0.08rem 0.35rem;border-radius:99px;
  background:#f0e8d0;color:#8a6020;font-weight:600;margin-left:0.4rem;}

/* ── OVERLAYS ─────────────────────────────────── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:500;}
.overlay.open{display:block;}

/* CENTER PANEL (for details + add forms) ─────── */
.cpanel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:white;border-radius:1rem;width:min(92vw,26rem);
  max-height:82vh;overflow-y:auto;z-index:600;display:none;
  box-shadow:0 8px 40px rgba(0,0,0,0.22);}
.cpanel.open{display:block;}
.cpanel-head{display:flex;align-items:center;gap:0.5rem;padding:1rem 1rem 0.75rem;
  border-bottom:1px solid #ece8e0;position:sticky;top:0;background:white;z-index:1;}
.cpanel-title{font-size:0.9rem;font-weight:600;flex:1;color:#111;}
.cpanel-close{background:none;border:none;font-size:1.3rem;color:#aaa;cursor:pointer;
  padding:0.1rem;border-radius:0.25rem;}
.cpanel-close:active{background:#f0ede6;}
.cpanel-body{padding:0.85rem 1rem 1.2rem;}

/* ── FORM FIELDS (water-intake keypad style) ──── */
.form-section{margin-bottom:1rem;}
.form-label{font-size:0.6rem;font-weight:700;color:#888;letter-spacing:0.04em;
  text-transform:uppercase;margin-bottom:0.28rem;display:block;}
.form-input{width:100%;border:1.5px solid #e0d8c8;border-radius:0.5rem;
  padding:0.55rem 0.65rem;font-size:0.85rem;background:#faf9f6;
  -webkit-appearance:none;outline:none;font-family:inherit;color:#111;}
.form-input:focus{border-color:#378ADD;background:white;}
.form-textarea{resize:none;min-height:3.5rem;line-height:1.4;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.4rem;}
.form-toggle{display:flex;gap:0;border:1.5px solid #e0d8c8;border-radius:0.5rem;overflow:hidden;}
.form-toggle-opt{flex:1;padding:0.5rem 0.3rem;border:none;font-size:0.72rem;font-weight:500;
  cursor:pointer;background:white;color:#666;transition:all 0.12s;text-align:center;}
.form-toggle-opt.active{background:#378ADD;color:white;font-weight:600;}
.form-toggle-opt:active{opacity:0.8;}

/* member tile picker */
.member-tiles{display:flex;flex-wrap:wrap;gap:0.4rem;margin-top:0.18rem;}
.mtile{display:flex;flex-direction:column;align-items:center;gap:0.18rem;
  padding:0.45rem 0.55rem;border-radius:0.6rem;border:1.5px solid #e0d8c8;
  background:white;cursor:pointer;transition:all 0.12s;min-width:2.8rem;}
.mtile:active{transform:scale(0.96);}
.mtile.selected{border-color:#1D9E75;background:#E1F5EE;}
.mtile-ico{font-size:1.1rem;}
.mtile-name{font-size:0.52rem;font-weight:600;color:#333;}
.mtile.selected .mtile-name{color:#085041;}

/* companion input */
.companion-row{display:flex;gap:0.38rem;align-items:center;margin-bottom:0.38rem;}
.companion-row .form-input{flex:1;}
.companion-add-btn{background:#E6F1FB;border:none;border-radius:0.5rem;
  padding:0.5rem 0.6rem;font-size:0.85rem;cursor:pointer;color:#0C447C;flex-shrink:0;}
.companion-list{margin-top:0.3rem;}
.companion-item{display:flex;align-items:center;gap:0.4rem;padding:0.3rem 0;
  font-size:0.72rem;color:#333;border-bottom:0.5px solid #f0ede6;}
.companion-item:last-child{border-bottom:none;}
.companion-del{background:none;border:none;font-size:0.85rem;color:#E53935;cursor:pointer;}

/* submit button */
.submit-btn{width:100%;padding:0.75rem;border:none;border-radius:0.65rem;
  font-size:0.9rem;font-weight:600;cursor:pointer;margin-top:0.75rem;
  min-height:2.75rem;letter-spacing:-0.2px;}
.submit-btn:active{opacity:0.85;}
.submit-btn-ryan   {background:#7F77DD;color:white;}
.submit-btn-family {background:#1D9E75;color:white;}
.submit-btn-flight {background:#378ADD;color:white;}
.submit-btn-hotel  {background:#D85A30;color:white;}
.submit-btn-reserve{background:#9B59B6;color:white;}
.delete-btn{width:100%;padding:0.6rem;border:1.5px solid #E53935;border-radius:0.65rem;
  font-size:0.8rem;font-weight:500;cursor:pointer;margin-top:0.5rem;
  background:white;color:#E53935;}
.delete-btn:active{background:#FFEBEE;}

/* detail rows */
.detail-row{display:flex;gap:0.5rem;padding:0.55rem 0;border-bottom:0.5px solid #f0ede6;align-items:flex-start;}
.detail-row:last-child{border-bottom:none;}
.detail-lbl{font-size:0.58rem;font-weight:700;color:#999;text-transform:uppercase;
  letter-spacing:0.04em;width:5.5rem;flex-shrink:0;padding-top:0.05rem;}
.detail-val{font-size:0.78rem;color:#111;flex:1;line-height:1.4;}

/* ── CONTEXT MENU ─────────────────────────────── */
.ctx{display:none;position:fixed;background:white;border:1px solid #e0d0b0;
  border-radius:0.65rem;z-index:700;min-width:10rem;overflow:hidden;
  box-shadow:0 4px 18px rgba(0,0,0,0.13);}
.ctx.open{display:block;}
.cxi{padding:0.7rem 0.85rem;font-size:0.75rem;cursor:pointer;
  display:flex;align-items:center;gap:0.5rem;color:#111;min-height:2.75rem;}
.cxi:active{background:#f5f0e8;}
.cxi.dng{color:#E53935;}
.cxd{height:0.5px;background:#ece8e0;}

/* ── CONFIRM MODAL ────────────────────────────── */
.confirm-modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:white;border-radius:1rem;width:min(88vw,22rem);padding:1.4rem 1.2rem;
  z-index:800;display:none;box-shadow:0 8px 40px rgba(0,0,0,0.22);}
.confirm-modal.open{display:block;}
.cm-title{font-size:0.9rem;font-weight:600;color:#111;margin-bottom:0.5rem;}
.cm-msg{font-size:0.72rem;color:#666;line-height:1.55;margin-bottom:1rem;}
.cm-btns{display:flex;gap:0.5rem;}
.cm-cancel{flex:1;padding:0.65rem;border:1.5px solid #e0d0b0;border-radius:0.6rem;
  background:none;font-size:0.78rem;cursor:pointer;color:#666;}
.cm-confirm{flex:1;padding:0.65rem;border:none;border-radius:0.6rem;
  background:#E53935;color:white;font-size:0.78rem;font-weight:600;cursor:pointer;}

/* ── ADD-TO-LISTS KEYPAD ──────────────────────── */
/* water-intake style: all fields in one scrollable center panel */
/* already covered by .cpanel + .form-* styles above */

/* ── TRIP NAME EDITOR ─────────────────────────── */
.trip-name-row{display:flex;align-items:center;gap:0.3rem;}
.trip-name-input{border:none;background:transparent;font-size:0.58rem;font-weight:600;
  color:#002B5C;outline:none;width:100%;}
.trip-name-input::placeholder{color:#6090B0;}


/* ── DROPDOWN SELECTOR ─────────────────────────── */
.dropdown-wrap{position:relative;display:inline-block;width:100%;}
.dropdown-sel{width:100%;background:white;border:none;border-bottom:2px solid #e0d8c8;
  padding:0.55rem 0.85rem;font-size:0.82rem;font-weight:600;color:#111;
  display:flex;align-items:center;justify-content:space-between;cursor:pointer;
  gap:0.5rem;-webkit-appearance:none;}
.dropdown-sel:active{background:#f8f6f2;}
.dropdown-sel-ico{font-size:1rem;}
.dropdown-sel-lbl{flex:1;text-align:left;}
.dropdown-sel-cnt{font-size:0.6rem;padding:0.1rem 0.42rem;border-radius:99px;
  background:#CECBF6;color:#3C3489;}
.dropdown-sel-cnt.family{background:#9FE1CB;color:#085041;}
.dropdown-arrow{font-size:0.8rem;color:#aaa;transition:transform 0.18s;}
.dropdown-arrow.open{transform:rotate(180deg);}
.dropdown-menu{position:absolute;top:100%;left:0;right:0;background:white;
  border:1px solid #e0d8c8;border-top:none;border-radius:0 0 0.65rem 0.65rem;
  z-index:400;box-shadow:0 6px 20px rgba(0,0,0,0.12);display:none;overflow:hidden;}
.dropdown-menu.open{display:block;}
.dropdown-item{display:flex;align-items:center;gap:0.55rem;padding:0.72rem 0.85rem;
  cursor:pointer;font-size:0.8rem;color:#111;border-bottom:0.5px solid #f0ede6;
  transition:background 0.1s;}
.dropdown-item:last-child{border-bottom:none;}
.dropdown-item:active{background:#f5f0e8;}
.dropdown-item.active{background:#EEEDFE;color:#3C3489;font-weight:600;}
.dropdown-item.active.family{background:#E1F5EE;color:#085041;}
.dropdown-item-ico{font-size:1.1rem;}
.dropdown-item-cnt{margin-left:auto;font-size:0.58rem;padding:0.08rem 0.38rem;
  border-radius:99px;background:#e8e4dc;color:#555;}
/* edit button in detail panel */
.edit-btn{width:100%;padding:0.65rem;border:1.5px solid #378ADD;border-radius:0.65rem;
  font-size:0.8rem;font-weight:500;cursor:pointer;margin-top:0.5rem;
  background:white;color:#378ADD;display:flex;align-items:center;

<script>
// ════════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════════
const SUPABASE_URL     = 'https://dehktexgwfurefdihtfn.supabase.co';
const SUPABASE_ANON_KEY= 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRlaGt0ZXhnd2Z1cmVmZGlodGZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNzExMjUsImV4cCI6MjA5NTY0NzEyNX0.pEwh8Q26c6NosCD_MnTe4zBHmwUmGuTo_a-wF56ObtI';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const FAMILY_IDS = {
  jmcr:     'a1000000-0000-0000-0000-000000000001',
  matthews: 'a2000000-0000-0000-0000-000000000002'
};

// ════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════
let state = {
  familyKey:    null,   // 'jmcr' | 'matthews'
  familyId:     null,
  familyName:   null,
  activeUser:   null,   // member object
  activeTab:    'ryan', // ryan|family|flight|hotel|reservations
  ryanSub:      'Backpack',
  activeMember: null,   // for family tab
  trip:         null,   // active trip row
  members:      [],
  categories:   [],     // Ryan's sub-lists
  checkItems:   [],     // all checklist items for active trip
  flights:      [],
  hotels:       [],
  reservations: [],
  realtimeSubs: [],
};

// ════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function setSyncDot(s){
  const d=document.getElementById('syncDot');
  d.className='sync-dot'+(s?' '+s:'');
}
function fmtDT(dt){
  if(!dt) return '—';
  const d=new Date(dt);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
    +' '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}
function fmtDate(dt){
  if(!dt) return '—';
  return new Date(dt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function isPast(dt){ return dt && new Date(dt) < new Date(); }

// ════════════════════════════════════════════════
//  FAMILY SELECTION
// ════════════════════════════════════════════════
async function selectFamily(key){
  state.familyKey  = key;
  state.familyId   = FAMILY_IDS[key];
  state.familyName = key==='jmcr'?'JMCR':'Matthews';
  document.getElementById('familyScreen').classList.add('hidden');
  document.getElementById('loadingScreen').classList.remove('hidden');
  // persist choice
  localStorage.setItem('familyKey', key);
  await loadAll();
}

function switchFamily(){
  // tear down realtime
  state.realtimeSubs.forEach(s=>sb.removeChannel(s));
  state.realtimeSubs=[];
  state.familyKey=null;
  localStorage.removeItem('familyKey');
  document.getElementById('app').style.display='none';
  document.getElementById('familyScreen').classList.remove('hidden');
}

// ════════════════════════════════════════════════
//  LOAD ALL DATA
// ════════════════════════════════════════════════
async function loadAll(){
  try {
    // members
    const {data:members, error:mErr} = await sb.from('members')
      .select('*').eq('family_id',state.familyId).order('display_order');
    if(mErr) throw new Error('members: '+mErr.message);
    state.members = members||[];

    // reset per-family state on family switch
    const packers = state.members.filter(m=>!m.is_subject);
    state.activeUser   = packers[0]||null;
    state.activeMember = packers[0]||null;

    // Matthews has no Ryan tab — default to family
    if(state.familyKey==='matthews') state.activeTab = 'family';

    // categories (Ryan sub-lists — JMCR only)
    const {data:cats, error:cErr} = await sb.from('categories')
      .select('*').eq('family_id',state.familyId).order('display_order');
    if(cErr) throw new Error('categories: '+cErr.message);
    state.categories = cats||[];

    // active trip
    const {data:trips, error:tErr} = await sb.from('trips')
      .select('*').eq('family_id',state.familyId).eq('is_active',true).limit(1);
    if(tErr) throw new Error('trips: '+tErr.message);
    state.trip = trips?.[0]||null;

    if(state.trip){
      await loadCheckItems();
    }

    // shared data (all families see flights/hotels/reservations)
    await loadFlights();
    await loadHotels();
    await loadReservations();

    // app_state — restore last tab/sub/member
    const {data:as} = await sb.from('app_state')
      .select('*').eq('family_id',state.familyId).limit(1);
    if(as?.[0]){
      // only restore ryan tab for JMCR
      if(state.familyKey==='jmcr'){
        state.activeTab = as[0].active_tab || 'ryan';
      } else {
        state.activeTab = (as[0].active_tab==='ryan') ? 'family' : (as[0].active_tab||'family');
      }
      state.ryanSub = as[0].active_sub || 'Backpack';
      const savedMember = state.members.find(m=>m.id===as[0].active_member);
      if(savedMember) state.activeMember = savedMember;
    }

    // realtime
    setupRealtime();

    // show app
    document.getElementById('loadingScreen').classList.add('hidden');
    document.getElementById('familyScreen').classList.add('hidden');
    document.getElementById('app').style.display='block';
    render();

  } catch(err) {
    console.error('loadAll error:', err);
    document.getElementById('loadingScreen').innerHTML =
      '<div style="color:white;text-align:center;padding:2rem;">' +
      '<div style="font-size:2rem;margin-bottom:1rem;">⚠️</div>' +
      '<div style="font-size:0.9rem;font-weight:600;margin-bottom:0.5rem;">Failed to load</div>' +
      '<div style="font-size:0.75rem;opacity:0.8;margin-bottom:1.5rem;">'+err.message+'</div>' +
      '<button onclick="location.reload()" style="padding:0.6rem 1.2rem;border:2px solid white;border-radius:0.5rem;background:transparent;color:white;font-size:0.85rem;cursor:pointer;">Retry</button>' +
      '</div>';
  }
}

async function loadCheckItems(){
  const {data} = await sb.from('checklist_items')
    .select('*').eq('trip_id',state.trip.id);
  state.checkItems = data||[];
}
async function loadFlights(){
  const {data} = await sb.from('flights')
    .select('*, flight_passengers(*, members(name,icon,icon_color))')
    .order('departure_dt');
  state.flights = data||[];
}
async function loadHotels(){
  const {data} = await sb.from('accommodations')
    .select('*').order('check_in_dt');
  state.hotels = data||[];
}
async function loadReservations(){
  const {data} = await sb.from('reservations')
    .select('*').order('reservation_dt');
  state.reservations = data||[];
}

// ════════════════════════════════════════════════
//  REALTIME
// ════════════════════════════════════════════════
function setupRealtime(){
  const ch = sb.channel('app-changes')
    .on('postgres_changes',{event:'*',schema:'public',table:'checklist_items'},async()=>{ await loadCheckItems(); renderPanel(); updateProg(); })
    .on('postgres_changes',{event:'*',schema:'public',table:'flights'},async()=>{ await loadFlights(); renderPanel(); })
    .on('postgres_changes',{event:'*',schema:'public',table:'flight_passengers'},async()=>{ await loadFlights(); renderPanel(); })
    .on('postgres_changes',{event:'*',schema:'public',table:'accommodations'},async()=>{ await loadHotels(); renderPanel(); })
    .on('postgres_changes',{event:'*',schema:'public',table:'reservations'},async()=>{ await loadReservations(); renderPanel(); })
    .subscribe();
  state.realtimeSubs.push(ch);
}

// ════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════
function render(){
  renderFamilyBadge();
  renderToolbar();
  renderNav();
  renderPanel();
  updateProg();
  document.getElementById('tripNameDisplay').textContent = state.trip?.name||'';
}

function renderFamilyBadge(){
  document.getElementById('familyBadge').textContent = state.familyName;
}

function renderToolbar(){
  const tb = document.getElementById('toolbar');
  // clear user buttons
  document.querySelectorAll('.ubtn').forEach(b=>b.remove());
  const ulbl = tb.querySelector('.ulbl');
  const pencil = tb.querySelector('.pencil-btn');
  const packers = state.members.filter(m=>!m.is_subject);
  packers.forEach(m=>{
    const btn = document.createElement('button');
    btn.className='ubtn'+(state.activeUser?.id===m.id?' active':'');
    btn.style.borderColor = m.icon_color||'#999';
    btn.style.color = m.icon_color||'#333';
    if(state.activeUser?.id===m.id) btn.style.background=(m.bg_color||'#eee')+'88';
    btn.innerHTML=`<span class="udot" style="background:${m.icon_color||'#999'}"></span>${esc(m.name)}`;
    btn.onclick=()=>{ state.activeUser=m; renderToolbar(); };
    ulbl.after(btn);
  });
}

function renderNav(){
  const nav = document.getElementById('nav5');
  nav.innerHTML='';
  const isJMCR = state.familyKey==='jmcr';
  const tabs = isJMCR
    ? [{id:'ryan',lbl:'Ryan',ico:'ti-bolt',cls:'t-ryan'},
       {id:'family',lbl:'Family',ico:'ti-users',cls:'t-family'},
       {id:'flight',lbl:'Flight',ico:'ti-plane',cls:'t-flight'},
       {id:'hotel',lbl:'Hotel',ico:'ti-building',cls:'t-hotel'},
       {id:'reservations',lbl:'Reserve',ico:'ti-calendar-event',cls:'t-reserve'}]
    : [{id:'family',lbl:'Family',ico:'ti-users',cls:'t-family'},
       {id:'flight',lbl:'Flight',ico:'ti-plane',cls:'t-flight'},
       {id:'hotel',lbl:'Hotel',ico:'ti-building',cls:'t-hotel'},
       {id:'reservations',lbl:'Reserve',ico:'ti-calendar-event',cls:'t-reserve'}];

  tabs.forEach(t=>{
    const btn=document.createElement('button');
    btn.className='nav5-btn '+t.cls+(state.activeTab===t.id?' active':'');
    const cnt = getTabCount(t.id);
    btn.innerHTML=`<i class="ti ${t.ico} nav5-ico"></i><span class="nav5-lbl">${t.lbl}</span><span class="nav5-cnt">${cnt}</span>`;
    btn.onclick=()=>{ state.activeTab=t.id; saveAppState(); renderNav(); renderPanel(); };
    nav.appendChild(btn);
  });
}

function getTabCount(tab){
  if(tab==='ryan'){
    const cat = state.categories.find(c=>c.name===state.ryanSub);
    if(!cat) return '0/0';
    const items = state.checkItems.filter(i=>i.category_id===cat.id&&!i.is_skipped);
    const done  = items.filter(i=>i.is_done).length;
    return `${done}/${items.length}`;
  }
  if(tab==='family') return state.checkItems.filter(i=>i.member_id&&!i.is_skipped).length;
  if(tab==='flight') return state.flights.length;
  if(tab==='hotel')  return state.hotels.length;
  if(tab==='reservations') return state.reservations.length;
  return 0;
}

function renderPanel(){
  const el = document.getElementById('panelContent');
  if(state.activeTab==='ryan')         el.innerHTML=renderRyanPanel();
  else if(state.activeTab==='family')  el.innerHTML=renderFamilyPanel();
  else if(state.activeTab==='flight')  el.innerHTML=renderFlightPanel();
  else if(state.activeTab==='hotel')   el.innerHTML=renderHotelPanel();
  else if(state.activeTab==='reservations') el.innerHTML=renderReservePanel();
  attachCheckHandlers();
}

// ── RYAN PANEL ─────────────────────────────────
function renderRyanPanel(){
  const cat = state.categories.find(c=>c.name===state.ryanSub);
  const items = cat
    ? sortItems(state.checkItems.filter(i=>i.category_id===cat.id))
    : [];
  const done  = items.filter(i=>i.is_done).length;
  const total = items.filter(i=>!i.is_skipped).length;

  const subDefs = [
    {name:'Backpack',ico:'ti-backpack',color:'#085041'},
    {name:'Meds',    ico:'ti-pill',    color:'#712B13'},
    {name:'Equip',   ico:'ti-stethoscope',color:'#0C447C'},
  ];
  const activeSub = subDefs.find(s=>s.name===state.ryanSub)||subDefs[0];

  const dropItems = subDefs.map(s=>{
    const sCat = state.categories.find(c=>c.name===s.name);
    const sDone = sCat ? state.checkItems.filter(i=>i.category_id===sCat.id&&i.is_done).length : 0;
    const sTot  = sCat ? state.checkItems.filter(i=>i.category_id===sCat.id&&!i.is_skipped).length : 0;
    return `<div class="dropdown-item${state.ryanSub===s.name?' active':''}"
      onclick="setRyanSub('${s.name}');closeDropdown('ryanDrop')">
      <i class="ti ${s.ico} dropdown-item-ico" style="color:${s.color}"></i>
      <span>${s.name}</span>
      <span class="dropdown-item-cnt">${sDone}/${sTot}</span>
    </div>`;
  }).join('');

  return `
  <div class="dropdown-wrap">
    <button class="dropdown-sel" onclick="toggleDropdown('ryanDrop')">
      <i class="ti ${activeSub.ico} dropdown-sel-ico" style="color:${activeSub.color}"></i>
      <span class="dropdown-sel-lbl">Ryan — ${esc(state.ryanSub)}</span>
      <span class="dropdown-sel-cnt">${done}/${total}</span>
      <i class="ti ti-chevron-down dropdown-arrow" id="ryanDropArrow"></i>
    </button>
    <div class="dropdown-menu" id="ryanDrop">${dropItems}</div>
  </div>
  <div class="ph ph-ryan">
    <i class="ti ${activeSub.ico}" style="color:${activeSub.color};font-size:1.1rem;"></i>
    <span class="ph-title">Ryan — ${esc(state.ryanSub)}</span>
    <span class="ph-cnt" style="background:#CECBF6;color:#3C3489;">${done}/${total}</span>
    <button class="ph-add ph-add-ryan" onclick="openAddItem('ryan')"><i class="ti ti-plus"></i> Add</button>
  </div>
  <ul class="ilist">${items.map(i=>renderItemRow(i,'ryan')).join('')}</ul>
  ${items.length===0?'<div class="empty-state">No items yet — tap Add to get started</div>':''}`;
}

// ── FAMILY PANEL ───────────────────────────────
function renderFamilyPanel(){
  const packers = state.members.filter(m=>!m.is_subject);
  const m = state.activeMember;
  const items = m ? sortItems(state.checkItems.filter(i=>i.member_id===m.id)) : [];
  const done  = items.filter(i=>i.is_done).length;
  const total = items.filter(i=>!i.is_skipped).length;

  const dropItems = packers.map(p=>{
    const pDone = state.checkItems.filter(i=>i.member_id===p.id&&i.is_done).length;
    const pTot  = state.checkItems.filter(i=>i.member_id===p.id&&!i.is_skipped).length;
    const isSel = state.activeMember?.id===p.id;
    return '<div class="dropdown-item'+(isSel?' active family':'')+'"'
      +' style="'+(isSel?'background:'+p.bg_color+';':'')+'"'
      +' onclick="setActiveMember(''+p.id+'');closeDropdown('familyDrop')">'
      +'<i class="ti '+(p.icon||'ti-user')+' dropdown-item-ico" style="color:'+(p.icon_color||'#666')+'"></i>'
      +'<span>'+esc(p.name)+'</span>'
      +'<span class="dropdown-item-cnt" style="background:'+(p.icon_color||'#999')+'22;color:'+(p.icon_color||'#555')+'">'+pDone+'/'+pTot+'</span>'
      +'</div>';
  }).join('');

  const selIco  = m ? '<i class="ti '+(m.icon||'ti-user')+' dropdown-sel-ico" style="color:'+(m.icon_color||'#1D9E75')+'"></i>' : '<i class="ti ti-users dropdown-sel-ico"></i>';
  const selLbl  = m ? esc(m.name)+"'s List" : 'Select person';
  const selCnt  = m ? '<span class="dropdown-sel-cnt family">'+done+'/'+total+'</span>' : '';

  const dropHTML = '<div class="dropdown-wrap">'
    +'<button class="dropdown-sel" onclick="toggleDropdown('familyDrop')">'
    +selIco+'<span class="dropdown-sel-lbl">'+selLbl+'</span>'+selCnt
    +'<i class="ti ti-chevron-down dropdown-arrow" id="familyDropArrow"></i>'
    +'</button>'
    +'<div class="dropdown-menu" id="familyDrop">'+dropItems+'</div>'
    +'</div>';

  if(!m) return dropHTML+'<div class="empty-state">Select a family member above</div>';

  const bgStyle = 'background:'+( m.bg_color||'#E1F5EE')+';';
  return dropHTML

// ── SORT ITEMS ─────────────────────────────────
function sortItems(items){
  const active  = items.filter(i=>!i.is_done&&!i.is_skipped).sort((a,b)=>a.text.localeCompare(b.text));
  const skipped = items.filter(i=>i.is_skipped).sort((a,b)=>a.text.localeCompare(b.text));
  const done    = items.filter(i=>i.is_done).sort((a,b)=>a.text.localeCompare(b.text));
  return [...active,...skipped,...done];
}

// ── PROGRESS BAR ───────────────────────────────
function updateProg(){
  const isJMCR = state.familyKey==='jmcr';
  if(!isJMCR){ document.getElementById('pl').textContent=''; return; }
  const catIds = state.categories.map(c=>c.id);
  const ryan = state.members.find(m=>m.is_subject);
  const ryanItems = state.checkItems.filter(i=>
    catIds.includes(i.category_id) || (ryan && i.member_id===ryan.id));
  const total = ryanItems.filter(i=>!i.is_skipped).length;
  const done  = ryanItems.filter(i=>i.is_done).length;
  const pct   = total ? Math.round(done/total*100) : 0;
  document.getElementById('pb').style.width = pct+'%';
  document.getElementById('pl').textContent = `Ryan's pack: ${done} of ${total} (${pct}%)`;
}

// ════════════════════════════════════════════════
//  CHECKLIST ACTIONS
// ════════════════════════════════════════════════
async function toggleCheck(itemId){
  setSyncDot('saving');
  const item = state.checkItems.find(i=>i.id===itemId);
  if(!item) return;
  const nowDone = !item.is_done;
  const {error} = await sb.from('checklist_items').update({
    is_done:  nowDone,
    done_by:  nowDone ? (state.activeUser?.id||null) : null,
    done_at:  nowDone ? new Date().toISOString() : null,
    is_skipped: false
  }).eq('id',itemId);
  if(error){ setSyncDot('error'); return; }
  item.is_done  = nowDone;
  item.done_by  = nowDone ? (state.activeUser?.id||null) : null;
  item.done_at  = nowDone ? new Date().toISOString() : null;
  item.is_skipped = false;
  setSyncDot('');
  renderPanel();
  updateProg();
}

async function undoCheck(itemId){
  setSyncDot('saving');
  const {error} = await sb.from('checklist_items').update({
    is_done:false,done_by:null,done_at:null
  }).eq('id',itemId);
  if(error){ setSyncDot('error'); return; }
  const item = state.checkItems.find(i=>i.id===itemId);
  if(item){ item.is_done=false; item.done_by=null; item.done_at=null; }
  setSyncDot('');
  renderPanel();
  updateProg();
}

async function skipItem(itemId){
  setSyncDot('saving');
  const item = state.checkItems.find(i=>i.id===itemId);
  if(!item) return;
  const nowSkipped = !item.is_skipped;
  const {error} = await sb.from('checklist_items').update({
    is_skipped:nowSkipped,is_done:false,done_by:null,done_at:null
  }).eq('id',itemId);
  if(error){ setSyncDot('error'); return; }
  item.is_skipped=nowSkipped; item.is_done=false;
  setSyncDot('');
  closeCtx();
  renderPanel();
  updateProg();
}

async function deleteItem(itemId){
  setSyncDot('saving');
  const {error} = await sb.from('checklist_items').delete().eq('id',itemId);
  if(error){ setSyncDot('error'); return; }
  state.checkItems = state.checkItems.filter(i=>i.id!==itemId);
  setSyncDot('');
  closeCtx();
  renderPanel();
  updateProg();
}

  const allMembers = state.members.filter(m=>!m.is_subject);

  // For ryan tab: show sub-list selector

  if(isFamilyTab){
    destHTML=`<div class="form-section">

               data-mid="${m.id}"
               style="border-color:${state.activeMember?.id===m.id?(m.icon_color||'#1D9E75'):'#e0d8c8'}"
               onclick="toggleMtile(this,'${m.icon_color||'#1D9E75'}')">

  } else {
    const sub = state.ryanSub;
    destHTML=`<div class="form-section">

      <div class="form-toggle" id="ryanSubPicker">
        ${['Backpack','Meds','Equip'].map(s=>`

            onclick="pickRyanSub(this,'${s}')">${s}</button>`).join('')}
      </div>

  }

  openCPanel(`Add Item — ${tab==='ryan'?'Ryan':'Family'}`,`

      <label class="form-label">Item description</label>
      <input class="form-input" id="addItemText" placeholder="e.g. Sunscreen" autofocus />
    </div>

      onclick="submitAddItem('${tab}')"><i class="ti ti-plus"></i> Add Item</button>
  `,'Add Item');
  document.getElementById('addItemText').focus();

function toggleMtile(el, color){
  el.classList.toggle('selected');
  el.style.borderColor = el.classList.contains('selected') ? color : '#e0d8c8';
}

function pickRyanSub(btn, sub){
  document.querySelectorAll('#ryanSubPicker .form-toggle-opt').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  state._pendingRyanSub = sub;
}

async function submitAddItem(tab){
  const text = document.getElementById('addItemText')?.value?.trim();
  if(!text){ alert('Please enter an item description.'); return; }
  if(!state.trip){ alert('No active trip found.'); return; }

  setSyncDot('saving');
  const rows = [];

  if(tab==='ryan'){
    const subName = state._pendingRyanSub || state.ryanSub;
    const cat = state.categories.find(c=>c.name===subName);
    if(!cat){ alert('Category not found.'); setSyncDot('error'); return; }
    rows.push({trip_id:state.trip.id,category_id:cat.id,text,created_by:state.activeUser?.id||null});
  } else {
    // family: get selected member tiles
    const selected = [...document.querySelectorAll('#addItemTargets .mtile.selected')];
    if(!selected.length){ alert('Select at least one family member.'); setSyncDot('error'); return; }
    selected.forEach(el=>{
      rows.push({trip_id:state.trip.id,member_id:el.dataset.mid,text,created_by:state.activeUser?.id||null});
    });
  }

  const {data,error} = await sb.from('checklist_items').insert(rows).select();
  if(error){ setSyncDot('error'); console.error(error); return; }
  state.checkItems.push(...(data||[]));
  setSyncDot('');
  delete state._pendingRyanSub;
  closeAll();
  renderPanel();
  updateProg();
}

async function submitAddFlight(){
  const from = document.getElementById('fFrom')?.value?.trim();
  const to   = document.getElementById('fTo')?.value?.trim();
  const dep  = document.getElementById('fDep')?.value;
  if(!from||!to||!dep){ alert('From, To and Departure are required.'); return; }

  setSyncDot('saving');
  const isInsured = document.querySelector('#insToggle .active')?.textContent==='Yes';

  const flightRow = {
    trip_id:         state.trip?.id||null,
    origin_city:     from,
    dest_city:       to,
    departure_dt:    dep ? new Date(dep).toISOString() : null,
    arrival_dt:      document.getElementById('fArr')?.value ? new Date(document.getElementById('fArr').value).toISOString():null,
    airline:         document.getElementById('fAirline')?.value?.trim()||null,
    flight_number:   document.getElementById('fFlightNum')?.value?.trim()||null,
    gate:            document.getElementById('fGate')?.value?.trim()||null,
    confirmation_no: document.getElementById('fConf')?.value?.trim()||null,
    is_insured:      isInsured,
    insurance_policy_no: isInsured?(document.getElementById('fPolicy')?.value?.trim()||null):null,
    baggage_notes:   document.getElementById('fBaggage')?.value?.trim()||null,
    notes:           document.getElementById('fNotes')?.value?.trim()||null,
    entered_by:      state.activeUser?.id||null,
  };

  const {data:flightData,error:fErr} = await sb.from('flights').insert(flightRow).select().single();
  if(fErr){ setSyncDot('error'); console.error(fErr); return; }

  // passengers
  const paxRows=[];
  document.querySelectorAll('#flightPaxTiles .mtile.selected').forEach(el=>{
    const mid = el.dataset.mid;
    const seat = document.querySelector(`[data-seat-mid="${mid}"]`)?.value?.trim()||null;
    paxRows.push({flight_id:flightData.id,member_id:mid,seat,is_companion:false});
  });
  state._companions.forEach(c=>{
    paxRows.push({flight_id:flightData.id,companion_name:c.name,seat:c.seat||null,is_companion:true});
  });
  if(paxRows.length) await sb.from('flight_passengers').insert(paxRows);

  state._companions=[];
  setSyncDot('');
  await loadFlights();
  closeAll();
  renderPanel();
}

async function submitEditFlight(id){
  const from = document.getElementById('fFrom')?.value?.trim();
  const to   = document.getElementById('fTo')?.value?.trim();
  const dep  = document.getElementById('fDep')?.value;
  if(!from||!to||!dep){ alert('From, To and Departure are required.'); return; }
  setSyncDot('saving');
  const isInsured = document.querySelector('#insToggle .active')?.textContent==='Yes';
  const updates = {
    origin_city:from, dest_city:to,
    departure_dt: new Date(dep).toISOString(),
    arrival_dt: document.getElementById('fArr')?.value ? new Date(document.getElementById('fArr').value).toISOString():null,
    airline:document.getElementById('fAirline')?.value?.trim()||null,
    flight_number:document.getElementById('fFlightNum')?.value?.trim()||null,
    gate:document.getElementById('fGate')?.value?.trim()||null,
    confirmation_no:document.getElementById('fConf')?.value?.trim()||null,
    is_insured:isInsured,
    insurance_policy_no:isInsured?(document.getElementById('fPolicy')?.value?.trim()||null):null,
    baggage_notes:document.getElementById('fBaggage')?.value?.trim()||null,
    notes:document.getElementById('fNotes')?.value?.trim()||null,
  };
  const {error} = await sb.from('flights').update(updates).eq('id',id);
  if(error){ setSyncDot('error'); console.error(error); return; }
  // rebuild passengers: delete old, insert new
  await sb.from('flight_passengers').delete().eq('flight_id',id);
  const paxRows=[];
  document.querySelectorAll('#editFlightPax .mtile.selected').forEach(el=>{
    const mid=el.dataset.mid;
    const seat=document.querySelector('[data-seat-mid="'+mid+'"]')?.value?.trim()||null;
    paxRows.push({flight_id:id,member_id:mid,seat,is_companion:false});
  });
  state._companions.forEach(co=>{
    paxRows.push({flight_id:id,companion_name:co.name,seat:co.seat||null,is_companion:true});
  });
  if(paxRows.length) await sb.from('flight_passengers').insert(paxRows);
  state._companions=[];
  setSyncDot('');
  await loadFlights();
  closeAll();
  renderPanel();
}

  openCPanel('Edit Reservation',`
    <div class="form-section"><label class="form-label">Type</label>
      <div class="form-toggle" id="resType">
        ${resTypes.map(t=>`<button class="form-toggle-opt${r.res_type===t?' active':''}"
          onclick="pickToggle(this,'resType')">${t}</button>`).join('')}
      </div>
    </div>
    <div class="form-section"><label class="form-label">Name / Description</label>
      <input class="form-input" id="rName" value="${esc(r.name||'')}"/></div>
    <div class="form-row">
      <div class="form-section"><label class="form-label">Date & Time</label>
        <input class="form-input" type="datetime-local" id="rDT" value="${dtLocal}"/></div>
      <div class="form-section"><label class="form-label"># of People</label>
        <input class="form-input" type="number" id="rPeople" value="${r.num_people||''}" min="1"/></div>
    </div>
    <div class="form-section"><label class="form-label">Location</label>
      <input class="form-input" id="rLocation" value="${esc(r.location||'')}"/></div>
    <div class="form-section"><label class="form-label">Confirmation #</label>
      <input class="form-input" id="rConf" value="${esc(r.confirmation_no||'')}"/></div>
    <div class="form-section"><label class="form-label">Reserved by</label>
      <input class="form-input" id="rReservedBy" value="${esc(r.reserved_by||'')}"/></div>
    <div class="form-row">
      <div class="form-section"><label class="form-label">Phone</label>
        <input class="form-input" id="rPhone" value="${esc(r.contact_phone||'')}"/></div>
      <div class="form-section"><label class="form-label">Email</label>
        <input class="form-input" type="email" id="rEmail" value="${esc(r.contact_email||'')}"/></div>
    </div>
    <div class="form-section"><label class="form-label">Cancellation Policy</label>
      <textarea class="form-input form-textarea" id="rCancel">${esc(r.cancellation_notes||'')}</textarea></div>
    <div class="form-section"><label class="form-label">Notes</label>
      <textarea class="form-input form-textarea" id="rNotes">${esc(r.notes||'')}</textarea></div>
    <button class="submit-btn submit-btn-reserve" onclick="submitEditReservation('${r.id}')">
      <i class="ti ti-check"></i> Save Changes</button>
    <button class="delete-btn" onclick="confirmDelete('reservation','${r.id}')"><i class="ti ti-trash"></i> Delete Reservation</button>
  `,esc(r.name));
}
async function submitEditReservation(id){
  const name = document.getElementById('rName')?.value?.trim();
  if(!name){ alert('Name is required.'); return; }
  setSyncDot('saving');
  const updates = {
    name,
    res_type:document.querySelector('#resType .active')?.textContent||'Other',
    reservation_dt:document.getElementById('rDT')?.value ? new Date(document.getElementById('rDT').value).toISOString():null,
    num_people:parseInt(document.getElementById('rPeople')?.value)||null,
    location:document.getElementById('rLocation')?.value?.trim()||null,
    confirmation_no:document.getElementById('rConf')?.value?.trim()||null,
    reserved_by:document.getElementById('rReservedBy')?.value?.trim()||null,
    contact_phone:document.getElementById('rPhone')?.value?.trim()||null,
    contact_email:document.getElementById('rEmail')?.value?.trim()||null,
    cancellation_notes:document.getElementById('rCancel')?.value?.trim()||null,
    notes:document.getElementById('rNotes')?.value?.trim()||null,
  };
  const {error} = await sb.from('reservations').update(updates).eq('id',id);
  if(error){ setSyncDot('error'); console.error(error); return; }
  const idx = state.reservations.findIndex(x=>x.id===id);
  if(idx>-1) state.reservations[idx]={...state.reservations[idx],...updates};
  setSyncDot('');
  closeAll();
  renderPanel();
}

// ════════════════════════════════════════════════
//  DELETE
// ════════════════════════════════════════════════
function confirmDelete(type, id){
  const msgs = {
    flight:'Delete this flight? This cannot be undone.',
    hotel:'Delete this accommodation? This cannot be undone.',
    reservation:'Delete this reservation? This cannot be undone.',
    item:'Delete this item from the checklist?'
  };
  openConfirm('Delete',msgs[type]||'Are you sure?',async()=>{
    setSyncDot('saving');
    const tables = {flight:'flights',hotel:'accommodations',reservation:'reservations',item:'checklist_items'};
    const {error} = await sb.from(tables[type]).delete().eq('id',id);
    if(error){ setSyncDot('error'); return; }
    if(type==='flight')      state.flights       = state.flights.filter(x=>x.id!==id);
    if(type==='hotel')       state.hotels        = state.hotels.filter(x=>x.id!==id);
    if(type==='reservation') state.reservations  = state.reservations.filter(x=>x.id!==id);
    if(type==='item')        state.checkItems    = state.checkItems.filter(x=>x.id!==id);
    setSyncDot('');
    closeAll();
    closeConfirm();
    renderPanel();
    updateProg();
  });
}

// ════════════════════════════════════════════════
//  CONTEXT MENU (checklist items)
// ════════════════════════════════════════════════
function showItemCtx(e, itemId, tab){
  e.stopPropagation();
  const item = state.checkItems.find(i=>i.id===itemId);
  if(!item) return;
  const menu = document.getElementById('ctxMenu');
  menu.innerHTML=`
    <div class="cxi" onclick="skipItem('${itemId}')">
      <i class="ti ti-player-skip-forward"></i> ${item.is_skipped?'Unskip':'Skip'}
    </div>
    ${item.is_done?`<div class="cxi" onclick="undoCheck('${itemId}');closeCtx()">
      <i class="ti ti-arrow-back-up"></i> Undo check</div>`:''}
    <div class="cxd"></div>
    <div class="cxi dng" onclick="confirmDelete('item','${itemId}')">
      <i class="ti ti-trash"></i> Delete</div>`;
  const x=Math.min(e.clientX,window.innerWidth-170);
  const y=Math.min(e.clientY+4,window.innerHeight-160);
  menu.style.top=y+'px'; menu.style.left=x+'px';
  menu.classList.add('open');
  document.getElementById('overlay').classList.add('open');
}
function closeCtx(){ document.getElementById('ctxMenu').classList.remove('open'); }

// ════════════════════════════════════════════════
//  NEW TRIP
// ════════════════════════════════════════════════
function openNewTrip(){
  openConfirm(
    'Start Fresh — New Trip?',
    `All categories and checklist items will remain intact, fully unchecked and sorted. Flights, hotels, and reservations are cleared. One-time flight companions are removed.\n\nTrip name:`,
    async()=>{
      const nameInput = document.getElementById('newTripName');
      const name = nameInput?.value?.trim() || 'My Trip';
      setSyncDot('saving');
      const {data,error} = await sb.rpc('start_new_trip',{
        p_family_id: state.familyId,
        p_trip_name: name
      });
      if(error){ setSyncDot('error'); console.error(error); return; }
      state.trip = null;
      await loadAll();
      setSyncDot('');
      closeConfirm();
      render();
    },
    `<input class="form-input" id="newTripName" placeholder="e.g. Cruise 2027" style="margin-top:0.5rem;width:100%;"/>`
  );
}

// ── RENAME TRIP ────────────────────────────────
function openRenameTrip(){
  if(!state.trip) return;
  openCPanel('Rename Trip',`
    <div class="form-section">
      <label class="form-label">Trip name</label>
      <input class="form-input" id="tripRenameInput" value="${esc(state.trip.name)}" placeholder="Trip name"/>
    </div>
    <button class="submit-btn submit-btn-flight" onclick="submitRenameTrip()">Save</button>
  `,'Rename Trip');
}
async function submitRenameTrip(){
  const name = document.getElementById('tripRenameInput')?.value?.trim();
  if(!name) return;
  setSyncDot('saving');
  const {error} = await sb.rpc('rename_trip',{p_family_id:state.familyId,p_new_name:name});
  if(error){ setSyncDot('error'); return; }
  if(state.trip) state.trip.name = name;
  document.getElementById('tripNameDisplay').textContent = name;
  setSyncDot('');
  closeAll();
}

// ════════════════════════════════════════════════
//  HELPER: Sub-list & member state
// ════════════════════════════════════════════════
function setRyanSub(sub){
  state.ryanSub = sub;
  saveAppState();
  renderPanel();
  renderNav();
}
function toggleDropdown(id){
  const menu  = document.getElementById(id);
  const arrow = document.getElementById(id+'Arrow');
  const isOpen = menu?.classList.contains('open');
  document.querySelectorAll('.dropdown-menu.open').forEach(m=>m.classList.remove('open'));
  document.querySelectorAll('.dropdown-arrow.open').forEach(a=>a.classList.remove('open'));
  if(!isOpen){ menu?.classList.add('open'); arrow?.classList.add('open'); }
}
function closeDropdown(id){
  document.getElementById(id)?.classList.remove('open');
  document.getElementById(id+'Arrow')?.classList.remove('open');
}
function setActiveMember(id){
  state.activeMember = state.members.find(m=>m.id===id)||null;
  saveAppState();
  renderPanel();
}
async function saveAppState(){
  await sb.from('app_state').upsert({
    family_id:     state.familyId,
    active_tab:    state.activeTab,
    active_sub:    state.ryanSub,
    active_member: state.activeMember?.id||null,
    updated_at:    new Date().toISOString()
  },{onConflict:'family_id'});
}

// ════════════════════════════════════════════════
//  UI HELPERS
// ════════════════════════════════════════════════
function openCPanel(title, bodyHTML, subtitle){
  document.getElementById('cpanelTitle').textContent = title;
  document.getElementById('cpanelBody').innerHTML = bodyHTML;
  document.getElementById('cpanel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  document.getElementById('cpanel').scrollTop=0;
}
function openConfirm(title, msg, onConfirm, extraHTML=''){
  document.getElementById('cmTitle').textContent = title;
  document.getElementById('cmMsg').textContent = msg;
  if(extraHTML){
    document.getElementById('cmMsg').innerHTML = msg.replace(/\n/g,'<br>')+extraHTML;
  }
  document.getElementById('cmConfirmBtn').onclick = onConfirm;
  document.getElementById('confirmModal').classList.add('open');
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm(){
  document.getElementById('confirmModal').classList.remove('open');
  document.getElementById('confirmOverlay').classList.remove('open');
}
function closeAll(){
  document.getElementById('cpanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('ctxMenu').classList.remove('open');
  state._pendingRyanSub=undefined;
}
document.addEventListener('click',e=>{
  if(!e.target.closest('#ctxMenu')&&!e.target.closest('.dotbtn'))
    document.getElementById('ctxMenu').classList.remove('open');
  if(!e.target.closest('.dropdown-wrap')){
    document.querySelectorAll('.dropdown-menu.open').forEach(m=>m.classList.remove('open'));
    document.querySelectorAll('.dropdown-arrow.open').forEach(a=>a.classList.remove('open'));
  }
});

// ════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════
(async function boot(){
  // Show family screen initially — always let user pick
  // (avoids stale localStorage causing blank screen)
  const saved = localStorage.getItem('familyKey');
  if(saved && FAMILY_IDS[saved]){
    // reset member state so it re-populates for this family
    state.activeUser   = null;
    state.activeMember = null;
    await selectFamily(saved);
  }
  // else family screen is already visible — nothing to do
})();
</script>
